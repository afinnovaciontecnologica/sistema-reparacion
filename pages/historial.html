<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Historial</title>

<link rel="stylesheet" href="../css/historial.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <h2>🛠 Sistema</h2>

    <!-- 🔥 CORREGIDO -->
    <a href="../dashboard.html">
        <i class="fa fa-home"></i> Inicio
    </a>

    <a href="clientes.html">
        <i class="fa fa-users"></i> Clientes
    </a>

    <a href="productos.html">
        <i class="fa fa-box"></i> Productos
    </a>

    <a href="reparaciones.html">
        <i class="fa fa-tools"></i> Reparaciones
    </a>

    <a href="ventas.html">
        <i class="fa fa-shopping-cart"></i> Ventas
    </a>

    <a href="cotizaciones.html">
        <i class="fa fa-file-alt"></i> Cotización
    </a>

    <a href="historial.html" class="active">
        <i class="fa fa-clock"></i> Historial
    </a>

    <a href="../index.html" id="btnLogout">
        <i class="fa fa-sign-out-alt"></i> Salir
    </a>

</div>

<!-- MAIN -->
<div class="main">

    <h1>📋 Historial de Ventas</h1>

    <div class="top-bar">
        <button onclick="borrarTodoHistorial()" class="btn-danger">
            🗑 Borrar todo
        </button>

        <input type="text" id="buscarVenta" placeholder="🔎 Buscar...">
    </div>

    <table>
        <thead>
            <tr>
                <th>N°</th>
                <th>Cliente</th>
                <th>Fecha</th>
                <th>Total</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody id="tablaHistorial"></tbody>
    </table>

    <div id="sinDatos">No hay ventas registradas</div>

</div>

<!-- MODAL -->
<div id="modalBoleta" class="modal">
    <div class="boleta">

        <div id="boletaVista"></div>

        <!-- 🔥 BOTONES CORREGIDOS -->
        <div class="botones">

            <button onclick="imprimirBoleta()" class="btn-print">
                🖨 Imprimir
            </button>

            <button onclick="descargarPDF()" class="btn-pdf">
                📄 PDF
            </button>

            <button onclick="cerrarBoleta()" class="btn-cerrar">
                ❌ Cerrar
            </button>

        </div>

    </div>
</div>

<script src="../js/historial.js"></script>
<script src="../js/guard.js"></script>

</body>
</html>
