<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/css/styles.css">
<link rel="stylesheet" href="/css/productos.css">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>

<body>

<!-- SIDEBAR -->

<aside class="sidebar">
    <h2>🛠 Sistema</h2>

<ul>
    <li>
        <a href="/dashboard.html" id="menu-inicio">
            <i class="fa fa-home"></i> Inicio
        </a>
    </li>


<li>
    <a href="clientes.html" id="menu-clientes">
        <i class="fa fa-users"></i> Clientes
    </a>
</li>

<!-- 🔥 AGREGADO -->
<li>
    <a href="cotizaciones.html" id="menu-cotizacion">
        <i class="fa fa-file-alt"></i> Cotización
    </a>
</li>

<!-- 🔥 ESTE ES ADMIN -->
<li>
    <a href="productos.html" id="menu-productos" class="active">
        <i class="fa fa-box"></i> Productos
    </a>
</li>

<li>
    <a href="reparaciones.html" id="menu-reparaciones">
        <i class="fa fa-tools"></i> Reparaciones
    </a>
</li>

<li>
    <a href="ventas.html" id="menu-ventas">
        <i class="fa fa-shopping-cart"></i> Ventas
    </a>
</li>

<!-- 🔥 SOLO ADMIN -->
<li>
    <a href="historial.html" id="menu-historial">
        <i class="fa fa-clock"></i> Historial
    </a>
</li>

<li>
    <a href="#" id="btnLogout">
        <i class="fa fa-sign-out-alt"></i> Salir
    </a>
</li>


</ul>

</aside>

<!-- CONTENIDO -->

<main class="main">

<!-- HEADER -->

<div class="header">
    <h1>📦 Gestión de Productos</h1>
    <p>Administra tu inventario de manera rápida y profesional</p>
</div>

<!-- FORMULARIO -->

<div class="card-form">


<h3><i class="fa fa-plus"></i> Nuevo Producto</h3>

<div class="grid-form">

    <div class="form-group">
        <label>Nombre</label>
        <input type="text" id="nombre" placeholder="Ej: Laptop HP">
    </div>

    <div class="form-group">
        <label>Descripción</label>
        <input type="text" id="descripcion" placeholder="Detalles del producto">
    </div>

    <div class="form-group">
        <label>Categoría</label>
        <select id="categoria"></select>
    </div>

    <div class="form-group">
        <label>Subcategoría</label>
        <select id="subcategoria"></select>
    </div>

    <div class="form-group">
        <label>Precio (S/)</label>
        <input type="number" id="precio">
    </div>

    <div class="form-group">
        <label>Stock</label>
        <input type="number" id="stock">
    </div>

    <div class="form-group">
        <label>Imagen</label>
        <input type="file" id="imagen" accept="image/*">
    </div>

</div>

<!-- PREVIEW -->
<div class="preview">
    <img id="previewImg" src="" alt="preview" style="display:none;">
</div>

<button class="btn-guardar" onclick="guardarProducto()">
    <i class="fa fa-save"></i> Guardar Producto
</button>


</div>

<!-- BUSCADOR -->

<div class="buscador">
    <i class="fa fa-search"></i>
    <input type="text" id="buscar" placeholder="Buscar por nombre, categoría..." onkeyup="buscarProducto()">
</div>

<!-- TABLA -->

<div class="tabla">


<table>
    <thead>
        <tr>
            <th>Producto</th>
            <th>Detalle</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Imagen</th>
            <th>Acciones</th>
        </tr>
    </thead>

    <tbody id="tablaProductos"></tbody>

</table>


</div>

</main>

<!-- SCRIPTS -->

<script src="/js/productos.js"></script>

<script src="/js/protect.js"></script>

<script src="/js/roles.js"></script>

<!-- PREVIEW IMAGEN -->

<script>
const inputImagen = document.getElementById("imagen");
const preview = document.getElementById("previewImg");

if(inputImagen){
    inputImagen.addEventListener("change", function(){
        const file = this.files[0];
        if(file){
            preview.src = URL.createObjectURL(file);
            preview.style.display = "block";
        }
    });
}
</script>

<!-- LOGOUT -->

<script>
const btnLogout = document.getElementById("btnLogout");

if(btnLogout){
    btnLogout.addEventListener("click", function(e){
        e.preventDefault();

        // limpiar sesión
        localStorage.removeItem("rol");

        // redirigir seguro
        window.location.href = "/login.html";
    });
}
</script>

</body>
</html>
