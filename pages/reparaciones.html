<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reparaciones PRO</title>

<!-- CSS -->
<link rel="stylesheet" href="../css/reparaciones.css">

<!-- ICONOS -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🛠 Sistema</h2>

    <a href="dashboard.html" id="menu-dashboard">
        <i class="fa fa-home"></i> Inicio
    </a>

    <a href="clientes.html" id="menu-clientes">
        <i class="fa fa-users"></i> Clientes
    </a>

    <a href="cotizaciones.html" id="menu-cotizacion">
        <i class="fa fa-file-alt"></i> Cotización
    </a>

    <a href="productos.html" id="menu-productos">
        <i class="fa fa-box"></i> Productos
    </a>

    <a href="reparaciones.html" id="menu-reparaciones" class="active">
        <i class="fa fa-tools"></i> Reparaciones
    </a>

    <a href="ventas.html" id="menu-ventas">
        <i class="fa fa-shopping-cart"></i> Ventas
    </a>

    <a href="historial.html" id="menu-historial">
        <i class="fa fa-clock"></i> Historial
    </a>

    <a href="#" id="btnLogout">
        <i class="fa fa-sign-out-alt"></i> Salir
    </a>
</div>

<!-- MAIN -->
<div class="main">

<div style="display:flex; justify-content:space-between; align-items:center;">
    <h1>🛠 Reparaciones PRO</h1>
    <button onclick="resetearOrden()">🔄 Resetear Orden</button>
</div>

<hr>

<!-- CLIENTE -->
<div class="card">
<h3>👤 Cliente</h3>

<div class="grid">
<input type="text" id="buscarCliente" placeholder="🔎 Buscar cliente" autocomplete="off">

<select id="cliente">
<option value="">Seleccionar cliente</option>
</select>

<div class="cliente-info">
    <div>📱 <strong id="telefonoCliente">-</strong></div>
    <div>📧 <strong id="correoCliente">-</strong></div>
</div>
</div>

<div id="mensajeCliente" class="mensaje"></div>
</div>

<!-- EQUIPO -->
<div class="card">
<h3>💻 Datos del Equipo</h3>

<div class="grid">

<select id="tipoEquipo">
<option value="">Tipo de equipo</option>
<option>Laptop</option>
<option>PC</option>
<option>Celular</option>
<option>Tablet</option>
<option>Impresora</option>
</select>

<select id="marca">
<option value="">Seleccione marca</option>
</select>

<input type="text" id="modelo" placeholder="Modelo">
<input id="tecnico" placeholder="👨‍🔧 Técnico responsable">
<input id="garantia" placeholder="🛡 Garantía">

<select id="estetica">
<option value="">Estado estético</option>
<option>Bueno</option>
<option>Regular</option>
<option>Malo</option>
</select>

</div>

<div class="accesorios-box">

<div class="accesorios-grid">
<label class="chip"><input type="checkbox" value="Cargador"> 🔌 <span>Cargador</span></label>
<label class="chip"><input type="checkbox" value="Batería"> 🔋 <span>Batería</span></label>
<label class="chip"><input type="checkbox" value="Mouse"> 🖱 <span>Mouse</span></label>
<label class="chip"><input type="checkbox" value="Funda"> 🎒 <span>Funda</span></label>
</div>

<div id="bloqueTintas" class="tintas-box">
<div class="tinta">🟡 Amarillo <select><option>Completo</option><option>Medio</option><option>Bajo</option><option>Vacío</option></select></div>
<div class="tinta">🟣 Magenta <select><option>Completo</option><option>Medio</option><option>Bajo</option><option>Vacío</option></select></div>
<div class="tinta">🔵 Cyan <select><option>Completo</option><option>Medio</option><option>Bajo</option><option>Vacío</option></select></div>
<div class="tinta">⚫ Negro <select><option>Completo</option><option>Medio</option><option>Bajo</option><option>Vacío</option></select></div>
</div>

</div>
</div>

<!-- DIAGNÓSTICO -->
<div class="card">
<h3>🧠 Diagnóstico</h3>

<div>
<button onclick="seleccionarTodo()">✔ Seleccionar todo</button>
<button onclick="limpiarServicios()">❌ Limpiar</button>
<button onclick="resetearCorrelativo()">🔄 Reset Orden</button>
</div>

<div id="listaServicios"></div>

<textarea id="solucion" placeholder="Solución"></textarea>
</div>

<!-- CONTROL -->
<div class="card">
<h3>💰 Control del Servicio</h3>

<div class="grid">
<select id="estado">
<option value="Pendiente">Pendiente</option>
<option value="En proceso">En proceso</option>
<option value="Terminado">Terminado</option>
</select>

<input type="number" id="costo" placeholder="Costo">
</div>

<button onclick="guardarReparacion()">Guardar</button>
</div>

<!-- TABLA -->
<h3>📋 Registro</h3>

<input type="text" id="buscarOrden" placeholder="Buscar...">

<table>
<thead>
<tr>
<th>Cliente</th>
<th>Equipo</th>
<th>Problema</th>
<th>Estado</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="tablaReparaciones"></tbody>
</table>

</div>

<!-- JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="../js/guard.js"></script>
<script src="../js/reparaciones.js"></script>

<!-- LOGOUT CORRECTO -->
<script>
document.getElementById("btnLogout").addEventListener("click", function(e){
    e.preventDefault();
    localStorage.clear();
    window.location.href = "../index.html";
});
</script>

<!-- MODAL -->
<div id="modalControl" class="modal-boleta">
<div class="boleta-box">

<div id="controlVista"></div>

<div>
<button onclick="descargarControlPDF()">PDF</button>
<button onclick="enviarControlWhatsApp()">WhatsApp</button>
<button onclick="cerrarControl()">Cerrar</button>
</div>

</div>
</div>

</body>
</html>
