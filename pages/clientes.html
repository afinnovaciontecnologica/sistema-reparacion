<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clientes</title>

<link rel="stylesheet" href="../css/clientes.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🛠 Sistema</h2>

    <a href="/dashboard.html" id="menu-dashboard">
        <i class="fa fa-home"></i> Inicio
    </a>

    <a href="clientes.html" id="menu-clientes" class="active">
        <i class="fa fa-users"></i> Clientes
    </a>

    <a href="cotizaciones.html" id="menu-cotizacion">
        <i class="fa fa-file-alt"></i> Cotización
    </a>

    <a href="productos.html" id="menu-productos">
        <i class="fa fa-box"></i> Productos
    </a>

    <a href="reparaciones.html" id="menu-reparaciones">
        <i class="fa fa-tools"></i> Reparaciones
    </a>

    <a href="ventas.html" id="menu-ventas">
        <i class="fa fa-shopping-cart"></i> Ventas
    </a>

    <a href="historial.html" id="menu-historial">
        <i class="fa fa-clock"></i> Historial
    </a>

    <a href="#" id="btnLogout">
        <i class="fa fa-sign-out-alt"></i> Salir
    </a>
</div>

<!-- MAIN -->
<div class="main">

<h1>👥 Gestión de Clientes</h1>
<hr>

<!-- FORMULARIO -->
<div class="card">
<h3>➕ Nuevo Cliente</h3>

<div class="grid">
    <input type="text" id="nombre" placeholder="Nombre completo">
    <input type="text" id="telefono" placeholder="Teléfono">
    <input type="email" id="correo" placeholder="Correo">
    <input type="text" id="direccion" placeholder="Dirección">
</div>

<button onclick="guardarCliente()">Guardar Cliente</button>
</div>

<!-- BUSCADOR -->
<div class="card">
<h3>🔎 Buscar Cliente</h3>
<input type="text" id="buscarCliente" placeholder="Buscar por nombre, teléfono, correo o dirección...">
</div>

<!-- TABLA -->
<div class="card">
<h3>📋 Lista de Clientes</h3>

<table>
<thead>
<tr>
<th>Nombre</th>
<th>Teléfono</th>
<th>Correo</th>
<th>Dirección</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="tablaClientes"></tbody>
</table>

</div>

</div>

<!-- JS -->
<script src="../js/guard.js"></script>
<script src="../js/clientes.js"></script>

<!-- LOGOUT -->
<script>
document.getElementById("btnLogout").addEventListener("click", function(e){
    e.preventDefault();
    localStorage.removeItem("rol");
    localStorage.removeItem("user");
    window.location.href = "/index.html";
});
</script>

</body>
</html>
