
<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clientes</title>

<!-- CSS -->
<link rel="stylesheet" href="/css/clientes.css">

<!-- ICONOS -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<h2>🛠 Sistema</h2>

<a href="/dashboard.html" id="menu-inicio">
    <i class="fa fa-home"></i> Inicio
</a>

<a href="clientes.html" class="active" id="menu-clientes">
    <i class="fa fa-users"></i> Clientes
</a>

<a href="productos.html" id="menu-productos">
    <i class="fa fa-box"></i> Productos
</a>

<a href="reparaciones.html" id="menu-reparaciones">
    <i class="fa fa-tools"></i> Reparaciones
</a>

<a href="ventas.html" id="menu-ventas">
    <i class="fa fa-shopping-cart"></i> Ventas
</a>

<a href="cotizaciones.html" id="menu-cotizacion">
    <i class="fa fa-file-alt"></i> Cotización
</a>

<a href="historial.html" id="menu-historial">
    <i class="fa fa-clock"></i> Historial
</a>

<a href="#" id="btnLogout">
    <i class="fa fa-sign-out-alt"></i> Salir
</a>

</div>

<!-- MAIN -->
<div class="main">

<h1><i class="fa fa-users"></i> Clientes</h1>

<!-- FORMULARIO -->
<div class="card">

    <input type="text" id="buscar" placeholder="🔎 Buscar cliente..." onkeyup="buscarCliente()">

    <div class="form-grid">
        <input type="text" id="nombre" placeholder="Nombre">
        <input type="text" id="telefono" placeholder="Teléfono">
        <input type="email" id="correo" placeholder="Correo">

        <button onclick="guardarCliente()">
            <i class="fa fa-save"></i> Guardar
        </button>
    </div>

</div>

<!-- TABLA -->
<div class="card">
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Nombre</th>
                <th>Teléfono</th>
                <th>Correo</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody id="tablaClientes">
            <tr>
                <td colspan="5">No hay clientes</td>
            </tr>
        </tbody>
    </table>
</div>

</div>

<!-- JS -->
<script src="/js/clientes.js"></script>
<script src="/js/roles.js"></script>
<script src="/js/protect.js"></script>

<!-- LOGOUT -->
<script>
document.getElementById("btnLogout").addEventListener("click", function(e){
    e.preventDefault();
    localStorage.removeItem("rol");
    window.location.href = "/login.html";
});
</script>

</body>
</html>
