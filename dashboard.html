<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard - AF Innovación Tecnológica</title>

<!-- ICONOS -->
<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<!-- CHART -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="css/dashboard.css">

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <div>

        <div class="logo">
            <img src="/assets/img/logo.png" class="logo-img">
            <h3>AF Innovación Tecnológica</h3>
            <small>Sistema de Gestión</small>
        </div>

        <div class="menu">

            <a href="pages/clientes.html">
                <i class="ri-user-3-line"></i> Clientes
            </a>

            <a href="pages/ventas.html">
                <i class="ri-shopping-bag-3-line"></i> Ventas
            </a>

            <a href="pages/reparaciones.html">
                <i class="ri-tools-line"></i> Reparaciones
            </a>

            <a href="pages/cotizaciones.html">
                <i class="ri-file-list-3-line"></i> Cotizaciones
            </a>

            <div id="adminMenu">

                <a href="pages/productos.html">
                    <i class="ri-box-3-line"></i> Productos
                </a>

                <a href="pages/historial.html">
                    <i class="ri-history-line"></i> Historial
                </a>

            </div>

        </div>

    </div>

    <div class="logout-box">
        <button class="logout-btn" onclick="logout()">
            <i class="ri-logout-box-r-line"></i> Salir
        </button>
    </div>

</div>

<!-- MAIN -->
<div class="main">

    <!-- HEADER MODERNO -->
    <div class="header">

        <div>
            <h1>Dashboard</h1>
            <p id="rolTexto">Cargando...</p>
        </div>

        <div class="header-actions">

            <button class="btn-action">
                <i class="ri-notification-3-line"></i>
            </button>

            <button class="btn-action">
                <i class="ri-settings-3-line"></i>
            </button>

            <div class="user-box">
                <i class="ri-user-3-line"></i>
                <span id="userRolMini"></span>
            </div>

        </div>

    </div>


    <!-- STATS MODERNAS -->
    <div class="stats">

        <div class="stat">
            <i class="ri-user-3-line"></i>
            <div class="stat-text">
                <span>Clientes</span>
                <b id="clientesTotal">0</b>
            </div>
        </div>

        <div class="stat">
            <i class="ri-shopping-cart-2-line"></i>
            <div class="stat-text">
                <span>Ventas</span>
                <b id="ventasTotal">0</b>
            </div>
        </div>

        <div class="stat">
            <i class="ri-money-dollar-circle-line"></i>
            <div class="stat-text">
                <span>Ingresos</span>
                <b id="ingresosTotal">S/ 0</b>
            </div>
        </div>

        <div class="stat">
            <i class="ri-tools-line"></i>
            <div class="stat-text">
                <span>Reparaciones</span>
                <b id="reparacionesTotal">0</b>
            </div>
        </div>

    </div>


    <!-- GRAFICO -->
    <div class="chart-box">
        <div class="chart-header">
            <h3>Ventas de la Semana</h3>
        </div>
        <canvas id="ventasChart"></canvas>
    </div>

</div>

<!-- JS -->
<script src="js/dashboard.js"></script>

<script>
/* MINI DETALLE UX */
document.addEventListener("DOMContentLoaded", () => {
    const rol = localStorage.getItem("rol")
    const mini = document.getElementById("userRolMini")

    if(mini && rol){
        mini.textContent = rol.toUpperCase()
    }
})
</script>

</body>
</html>
