<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Reparación</title>

    <!-- FUENTE -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="/sistema-reparacion/css/styles.css">
    <link rel="stylesheet" href="/sistema-reparacion/css/forms.css">

    <meta name="theme-color" content="#0f172a">
</head>

<body>

    <main class="login-screen">
        <section class="login-card">

            <header class="login-header">
                <div class="logo-wrapper">
                    <img src="/sistema-reparacion/assets/img/Logo.png" class="main-logo">
                </div>

                <h1>Bienvenido</h1>
                <p>Accede al sistema</p>
            </header>

            <div id="errorMsg" class="error-banner" style="display:none;"></div>

            <form id="loginForm" autocomplete="off">

                <div class="form-group">
                    <label>Correo</label>
                    <input type="email" id="usuario" required>
                </div>

                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" required>
                </div>

                <button type="submit" class="btn-primary">
                    Ingresar
                </button>

            </form>

        </section>
    </main>

    <script>
        console.log("HTML CARGADO");
    </script>

    <!-- 🔥 AQUÍ ESTABA EL ERROR -->
    <script type="module" src="/sistema-reparacion/js/auth.js"></script>

</body>
</html>
